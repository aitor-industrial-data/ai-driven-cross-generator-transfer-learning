name: Deploy t2-inference-lambda

on:
  push:
    branches: [main]
    paths:
      - 'src/t2_daily_inference_serverless.py'
      - 'src/shared/**'
      - 'Dockerfile'
      - 'requirements.txt'

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION:  eu-south-2
  ECR_REPO:    t2-inference-lambda
  LAMBDA_NAME: t2-inference-lambda
  AWS_ACCOUNT: 610140802215

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configurar credenciales AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::610140802215:role/github-t2-lambda-role
          aws-region:     ${{ env.AWS_REGION }}
          audience:       sts.amazonaws.com

      - name: Login en Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build y push a ECR
        env:
          IMAGE_URI: ${{ env.AWS_ACCOUNT }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPO }}
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --provenance=false \
            --push \
            -t $IMAGE_URI:latest .

      - name: Resolver digest exacto
        id: digest
        env:
          IMAGE_URI: ${{ env.AWS_ACCOUNT }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPO }}
        run: |
          DIGEST=$(aws ecr describe-images \
            --repository-name ${{ env.ECR_REPO }} \
            --image-ids imageTag=latest \
            --query 'imageDetails[0].imageDigest' \
            --output text)
          echo "uri=${IMAGE_URI}@${DIGEST}" >> $GITHUB_OUTPUT

      - name: Actualizar Lambda con digest
        run: |
          aws lambda update-function-code \
            --function-name ${{ env.LAMBDA_NAME }} \
            --image-uri ${{ steps.digest.outputs.uri }}

      - name: Esperar a que Lambda esté lista
        run: |
          aws lambda wait function-updated \
            --function-name ${{ env.LAMBDA_NAME }}
          echo "✅ Lambda actualizada: ${{ steps.digest.outputs.uri }}"