name: Deploy t2-inference-lambda

on:
  push:
    branches: [main]
    paths:
      - 'src/t2_daily_inference_serverless.py'
      - 'src/t2_monthly_retrain.py'
      - 'src/shared/**'
      - 'Dockerfile'
      - 'requirements.txt'

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION:          eu-south-2
  ECR_REPO:            t2-inference-lambda
  LAMBDA_DAILY:        t2-inference-lambda
  LAMBDA_MONTHLY:      t2-monthly-retrain-lambda
  AWS_ACCOUNT:         610140802215

jobs:
  build-and-push:
    name: Build & Push imagen ECR
    runs-on: ubuntu-latest
    outputs:
      image-uri: ${{ steps.digest.outputs.uri }}

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configurar credenciales AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::610140802215:role/github-t2-lambda-role
          aws-region:     ${{ env.AWS_REGION }}
          audience:       sts.amazonaws.com

      - name: Login en Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build y push a ECR
        env:
          IMAGE_URI: ${{ env.AWS_ACCOUNT }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPO }}
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --provenance=false \
            --push \
            -t $IMAGE_URI:latest .

      - name: Resolver digest exacto
        id: digest
        env:
          IMAGE_URI: ${{ env.AWS_ACCOUNT }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPO }}
        run: |
          DIGEST=$(aws ecr describe-images \
            --repository-name ${{ env.ECR_REPO }} \
            --image-ids imageTag=latest \
            --query 'imageDetails[0].imageDigest' \
            --output text)
          echo "uri=${IMAGE_URI}@${DIGEST}" >> $GITHUB_OUTPUT

  deploy-daily:
    name: Deploy Lambda diaria
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Configurar credenciales AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::610140802215:role/github-t2-lambda-role
          aws-region:     ${{ env.AWS_REGION }}
          audience:       sts.amazonaws.com

      - name: Actualizar Lambda diaria con digest
        run: |
          aws lambda update-function-code \
            --function-name ${{ env.LAMBDA_DAILY }} \
            --image-uri ${{ needs.build-and-push.outputs.image-uri }}

      - name: Esperar a que Lambda diaria esté lista
        run: |
          aws lambda wait function-updated \
            --function-name ${{ env.LAMBDA_DAILY }}
          echo "✅ Lambda diaria actualizada: ${{ needs.build-and-push.outputs.image-uri }}"

  deploy-monthly:
    name: Deploy Lambda mensual
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Configurar credenciales AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::610140802215:role/github-t2-lambda-role
          aws-region:     ${{ env.AWS_REGION }}
          audience:       sts.amazonaws.com

      - name: Actualizar Lambda mensual con digest
        run: |
          aws lambda update-function-code \
            --function-name ${{ env.LAMBDA_MONTHLY }} \
            --image-uri ${{ needs.build-and-push.outputs.image-uri }}

      - name: Esperar a que Lambda mensual esté lista
        run: |
          aws lambda wait function-updated \
            --function-name ${{ env.LAMBDA_MONTHLY }}
          echo "✅ Lambda mensual actualizada: ${{ needs.build-and-push.outputs.image-uri }}"